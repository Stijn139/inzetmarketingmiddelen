// ============================================================
// PLANNERS PAGE
// ============================================================
function PlannersPage({ toast, role }) {
  const [planners, setPlanners] = useState([]);
  const [levs, setLevs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [detail, setDetail] = useState(null);
  const [pm, setPm] = useState([]);
  const [selModal, setSelModal] = useState(false);
  const [importModal, setImportModal] = useState(false);
  const [f, setF] = useState({});
  const [counts, setCounts] = useState({});
  const [allPm, setAllPm] = useState([]);
  const [expanded, setExpanded] = useState({});
  const [tablesOk, setTablesOk] = useState(null);
  const isMkt = role === "marketing";

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [p, l, ap] = await Promise.all([
        db.get("leveranciers_marketing_planner", { select: "*,leverancier:leverancier_id(bedrijfsnaam,leveranciernummer)", order: "created_at.desc" }),
        db.get("leverancier", { order: "bedrijfsnaam.asc" }),
        db.get("planner_marketingmiddel", { select: "*,marketingmiddel:marketingmiddel_id(pakketnaam,rubriek,tarief,segment,type_campagne,formaat)" })
      ]);
      setPlanners(p); setLevs(l); setAllPm(ap);
      const c = {}; ap.forEach(x => c[x.planner_id] = (c[x.planner_id] || 0) + 1); setCounts(c);
    } catch (e) { toast(e.message, "error"); }
    setLoading(false);
    try {
      await db.get("planner_middel_notities", { limit: 1 });
      await db.get("planner_middel_historie", { limit: 1 });
      setTablesOk(true);
    } catch { setTablesOk(false); }
  }, [toast]);
  useEffect(() => { load(); }, [load]);

  const loadPm = useCallback(async pid => {
    try { setPm(await db.get("planner_marketingmiddel", { select: "*,marketingmiddel:marketingmiddel_id(pakketnaam,rubriek,tarief,segment,type_campagne)", eq: { planner_id: pid }, order: "created_at.asc" })); }
    catch (e) { toast(e.message, "error"); }
  }, [toast]);
  useEffect(() => { if (detail) loadPm(detail.id); }, [detail, loadPm]);

  const sts = ["Concept", "Actief", "Afgerond", "Geannuleerd"];
  const tps = [...new Set(planners.map(p => p.type).filter(Boolean))];
  const filtered = planners.filter(p => {
    if (f.status && p.status !== f.status) return false;
    if (f.type && p.type !== f.type) return false;
    return true;
  });

  async function create(data) {
    try {
      const res = await db.post("leveranciers_marketing_planner", { ...data, status: "Concept" });
      toast("Planner aangemaakt"); setModal(false); load();
      const full = await db.get("leveranciers_marketing_planner", { select: "*,leverancier:leverancier_id(bedrijfsnaam,leveranciernummer)", eq: { id: res[0].id } });
      setDetail(full[0]);
    } catch (e) { toast(e.message, "error"); }
  }

  async function chgStatus(pl, ns) {
    try {
      if (ns === "Actief") {
        const lk = await db.get("planner_marketingmiddel", { eq: { planner_id: pl.id } });
        if (!lk.length) { toast("Min. 1 middel vereist", "error"); return; }
      }
      if (ns === "Geannuleerd") {
        if (!confirm("Annuleren? Alle middelen worden geannuleerd.")) return;
        const lk = await db.get("planner_marketingmiddel", { eq: { planner_id: pl.id } });
        for (const m of lk.filter(l => l.status === "Gepland" || l.status === "In uitvoering")) {
          await db.patch("planner_marketingmiddel", m.id, { status: "Geannuleerd" });
          const cs = await db.get("marketingmiddel_capaciteit", { eq: { marketingmiddel_id: m.marketingmiddel_id } });
          for (const c of cs) if (c.gereserveerd > 0) await db.patch("marketingmiddel_capaciteit", c.id, { gereserveerd: c.gereserveerd - 1 });
        }
      }
      await db.patch("leveranciers_marketing_planner", pl.id, { status: ns });
      toast(`Status → ${ns}`);
      const full = await db.get("leveranciers_marketing_planner", { select: "*,leverancier:leverancier_id(bedrijfsnaam,leveranciernummer)", eq: { id: pl.id } });
      setDetail(full[0]); loadPm(pl.id); load();
    } catch (e) { toast(e.message, "error"); }
  }

  async function addMiddel(midInfo) {
    // midInfo = { pakketnaam, marketingmiddel, formaat, tarief, rubriek, segment, periodes[] }
    try {
      // Find or create the marketingmiddel record in Supabase
      let midId;
      const existing = await db.get("marketingmiddel", { eq: { pakketnaam: midInfo.pakketnaam }, limit: 1 });
      if (existing.length > 0) {
        midId = existing[0].id;
      } else {
        const created = await db.post("marketingmiddel", {
          pakketnaam: midInfo.pakketnaam,
          rubriek: midInfo.rubriek || "",
          segment: midInfo.segment || "",
          tarief: midInfo.tarief || 0,
          formaat: midInfo.formaat || "",
          type_campagne: midInfo.rubriek || ""
        });
        midId = created[0].id;
      }

      const periodes = midInfo.periodes || [];

      if (periodes.length === 0) {
        // Add one entry without specific periode
        await db.post("planner_marketingmiddel", {
          planner_id: detail.id,
          marketingmiddel_id: midId,
          status: "Gepland",
          gekozen_formaat: midInfo.formaat || null,
          gekozen_tarief: midInfo.tarief || null,
          gekozen_periode: null,
          startdatum: null,
          einddatum: null,
          deadline: null
        });
      } else {
        // Add one entry per selected periode
        for (const p of periodes) {
          const periodeLabel = `${p.maand} ${p.jaar}`;
          await db.post("planner_marketingmiddel", {
            planner_id: detail.id,
            marketingmiddel_id: midId,
            status: "Gepland",
            gekozen_formaat: midInfo.formaat || null,
            gekozen_tarief: midInfo.tarief || null,
            gekozen_periode: periodeLabel,
            startdatum: p.publicatiedatum || null,
            einddatum: null,
            deadline: p.deadline_leverancier || null
          });
        }
      }

      const label = midInfo.pakketnaam
        + (midInfo.formaat ? ` (${midInfo.formaat})` : "")
        + (periodes.length > 0 ? ` — ${periodes.length} periode${periodes.length !== 1 ? "s" : ""}` : "");
      toast(`${label} toegevoegd`);
      setSelModal(false); loadPm(detail.id);
    } catch (e) { toast(e.message, "error"); }
  }

  async function rmMiddel(row) {
    if (!confirm(`"${row.marketingmiddel?.pakketnaam}" verwijderen?`)) return;
    try {
      if (row.status === "Gepland" || row.status === "In uitvoering") {
        const cs = await db.get("marketingmiddel_capaciteit", { eq: { marketingmiddel_id: row.marketingmiddel_id } });
        for (const c of cs) if (c.gereserveerd > 0) await db.patch("marketingmiddel_capaciteit", c.id, { gereserveerd: c.gereserveerd - 1 });
      }
      await db.del("planner_marketingmiddel", row.id);
      toast("Verwijderd"); loadPm(detail.id);
    } catch (e) { toast(e.message, "error"); }
  }

  async function updMiddel(row, data) {
    try {
      if ((data.status === "Geannuleerd" || data.status === "Afgerond") && (row.status === "Gepland" || row.status === "In uitvoering")) {
        if (data.status === "Geannuleerd" && !confirm("Annuleren?")) return;
        const cs = await db.get("marketingmiddel_capaciteit", { eq: { marketingmiddel_id: row.marketingmiddel_id } });
        for (const c of cs) if (c.gereserveerd > 0) await db.patch("marketingmiddel_capaciteit", c.id, { gereserveerd: c.gereserveerd - 1 });
      }
      await db.patch("planner_marketingmiddel", row.id, data);
      if (tablesOk) {
        if (data.status && data.status !== row.status) {
          try { await db.post("planner_middel_historie", { planner_middel_id: row.id, actie: "status_gewijzigd", beschrijving: `Status gewijzigd van ${row.status} naar ${data.status}`, oude_waarde: row.status, nieuwe_waarde: data.status, auteur: role === "inkoop" ? "Inkoop" : "Marketing" }); } catch {}
        }
      }
      toast("Bijgewerkt"); loadPm(detail.id);
    } catch (e) { toast(e.message, "error"); }
  }

  async function exportXLSX() {
    toast("Export wordt voorbereid...");
    try {
      const allMiddelen = await db.get("planner_marketingmiddel", { select: "*,marketingmiddel:marketingmiddel_id(pakketnaam,rubriek,segment,type_campagne,formaat,tarief,startdatum,einddatum,deadline)" });
      const middelenPerPlanner = {};
      allMiddelen.forEach(m => { if (!middelenPerPlanner[m.planner_id]) middelenPerPlanner[m.planner_id] = []; middelenPerPlanner[m.planner_id].push(m); });
      const XLSX = window.XLSX;
      const wb = XLSX.utils.book_new();
      const h1 = ["Planner titel","Leverancier","Leveranciernummer","Type","Status","Aantal middelen","Totaal tarief (EUR)"];
      const r1 = filtered.map(p => { const mm = middelenPerPlanner[p.id] || []; return [p.titel, p.leverancier?.bedrijfsnaam || "", p.leverancier?.leveranciernummer || "", p.type || "", p.status || "", mm.length, mm.reduce((s,m) => s + Number(m.gekozen_tarief||m.marketingmiddel?.tarief||0), 0)]; });
      const ws1 = XLSX.utils.aoa_to_sheet([h1, ...r1]); ws1["!cols"] = [32,24,18,16,14,16,20,16].map(w=>({wch:w})); XLSX.utils.book_append_sheet(wb, ws1, "Planners");
      const h2 = ["Planner titel","Leverancier","Leveranciernummer","Planner status","Planner type","Middel naam","Formaat","Rubriek","Segment","Tarief (EUR)","Status middel","Startdatum","Deadline"];
      const r2 = [];
      filtered.forEach(p => { const mm = middelenPerPlanner[p.id] || []; if (mm.length === 0) { r2.push([p.titel, p.leverancier?.bedrijfsnaam||"", p.leverancier?.leveranciernummer||"", p.status, p.type, "","","","","","","",""]); } else { mm.forEach(m => r2.push([p.titel, p.leverancier?.bedrijfsnaam||"", p.leverancier?.leveranciernummer||"", p.status||"", p.type||"", m.marketingmiddel?.pakketnaam||"", m.gekozen_formaat||"", m.marketingmiddel?.rubriek||"", m.marketingmiddel?.segment||"", Number(m.gekozen_tarief||m.marketingmiddel?.tarief||0), m.status||"", m.startdatum||"", m.deadline||""])); } });
      const ws2 = XLSX.utils.aoa_to_sheet([h2, ...r2]); ws2["!cols"] = [28,22,18,14,14,36,14,16,14,14,16,14,14,14].map(w=>({wch:w})); XLSX.utils.book_append_sheet(wb, ws2, "Middelen detail");
      const byLev = {};
      filtered.forEach(p => { const key = p.leverancier?.bedrijfsnaam || "Onbekend"; if (!byLev[key]) byLev[key] = { naam: key, nr: p.leverancier?.leveranciernummer||"", planners:0, middelen:0, tarief:0 }; const mm = middelenPerPlanner[p.id] || []; byLev[key].planners++; byLev[key].middelen += mm.length; byLev[key].tarief += mm.reduce((s,m) => s + Number(m.gekozen_tarief||m.marketingmiddel?.tarief||0), 0); });
      const h3 = ["Leverancier","Leveranciernummer","Aantal planners","Totaal middelen","Totaal tarief (EUR)"];
      const r3 = Object.values(byLev).sort((a,b)=>b.tarief-a.tarief).map(l=>[l.naam,l.nr,l.planners,l.middelen,l.tarief]);
      const ws3 = XLSX.utils.aoa_to_sheet([h3, ...r3]); ws3["!cols"] = [28,18,16,16,20].map(w=>({wch:w})); XLSX.utils.book_append_sheet(wb, ws3, "Per leverancier");
      const date = new Date().toISOString().slice(0,10);
      XLSX.writeFile(wb, `planners_export_${date}.xlsx`);
      toast("Export gedownload");
    } catch(e) { toast("Export mislukt: " + e.message, "error"); }
  }

  if (detail) {
    const locked = detail.status === "Afgerond" || detail.status === "Geannuleerd";
    const tot = pm.reduce((s, r) => s + Number(r.gekozen_tarief || r.marketingmiddel?.tarief || 0), 0);
    return <div>
      <button onClick={() => { setDetail(null); load(); }} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 600, color: "var(--tu)", marginBottom: 20, padding: 0 }}>← Terug</button>
      <Card style={{ padding: 28, marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 16 }}>
          <div>
            <Badge status={detail.status} />
            <h2 style={{ fontSize: 24, fontWeight: 700, marginTop: 8 }}>{detail.titel}</h2>
            <div style={{ display: "flex", gap: 20, marginTop: 10, fontSize: 13, color: "var(--t2)" }}>
              <span><strong style={{ color: "var(--t)" }}>{detail.leverancier?.bedrijfsnaam}</strong> #{detail.leverancier?.leveranciernummer}</span>
              <span>{detail.type}</span>
            </div>
          </div>
          {!isMkt && !locked && (
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {detail.status !== "Actief" && <Btn small primary onClick={() => chgStatus(detail, "Actief")}>Activeren</Btn>}
              {detail.status !== "Concept" && <Btn small onClick={() => chgStatus(detail, "Concept")}>→ Concept</Btn>}
              {detail.status !== "Afgerond" && <Btn small onClick={() => chgStatus(detail, "Afgerond")} style={{ color: "var(--p)", borderColor: "var(--p)" }}>Afronden</Btn>}
              <Btn small danger onClick={() => chgStatus(detail, "Geannuleerd")}>Annuleren</Btn>
            </div>
          )}
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 12, marginBottom: 20 }}>
        <StatCard label="Middelen" value={pm.length} delay={50} />
        <StatCard label="Totaal tarief" value={`€${fmt(tot)}`} delay={100} />
      </div>

      {tablesOk === false && (
        <div style={{ background: "var(--ab)", border: "1px solid rgba(245,158,11,.3)", borderRadius: "var(--rds)", padding: "10px 16px", marginBottom: 16, fontSize: 12, color: "#92400e", display: "flex", alignItems: "flex-start", gap: 8 }}>
          <span>💡</span>
          <span>Om opmerkingen &amp; historie op te slaan, voeg de tabellen toe in Supabase.
            <button onClick={() => { const sql = `-- Voer uit in Supabase SQL Editor:\n\nCREATE TABLE planner_middel_notities (\n  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,\n  planner_middel_id uuid REFERENCES planner_marketingmiddel(id) ON DELETE CASCADE,\n  tekst text NOT NULL,\n  auteur text,\n  created_at timestamptz DEFAULT now()\n);\n\nCREATE TABLE planner_middel_historie (\n  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,\n  planner_middel_id uuid REFERENCES planner_marketingmiddel(id) ON DELETE CASCADE,\n  actie text,\n  beschrijving text NOT NULL,\n  oude_waarde text,\n  nieuwe_waarde text,\n  auteur text,\n  created_at timestamptz DEFAULT now()\n);\n\nALTER TABLE planner_middel_notities ENABLE ROW LEVEL SECURITY;\nALTER TABLE planner_middel_historie ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "allow all" ON planner_middel_notities FOR ALL USING (true) WITH CHECK (true);\nCREATE POLICY "allow all" ON planner_middel_historie FOR ALL USING (true) WITH CHECK (true);`; prompt("Kopieer deze SQL en voer uit in Supabase:", sql); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#92400e", fontWeight: 700, textDecoration: "underline", marginLeft: 6, padding: 0, fontSize: 12 }}>Bekijk SQL →</button>
          </span>
        </div>
      )}

      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 24px", borderBottom: "1px solid var(--b)" }}>
          <h3 style={{ fontSize: 15, fontWeight: 700 }}>Middelen <span style={{ color: "var(--t3)", fontWeight: 400 }}>({pm.length})</span></h3>
          {!isMkt && !locked && <Btn small primary onClick={() => setSelModal(true)}>+ Toevoegen</Btn>}
        </div>
        {pm.length === 0
          ? <Empty icon="📋" text="Voeg middelen toe via de knop rechtsboven" />
          : <div>{pm.map((r, i) => <PmRow key={r.id} row={r} locked={locked || isMkt} onUpdate={updMiddel} onRemove={rmMiddel} last={i === pm.length - 1} toast={toast} tablesOk={tablesOk} />)}</div>}
      </Card>
      {selModal && <SelModal onSelect={addMiddel} onClose={() => setSelModal(false)} existing={pm.map(r => r.gekozen_formaat ? r.marketingmiddel?.pakketnaam + ":" + r.gekozen_formaat : r.marketingmiddel?.pakketnaam)} toast={toast} />}
    </div>;
  }

  const toggleExpand = id => setExpanded(p => ({ ...p, [id]: !p[id] }));
  const getPmFor = pid => allPm.filter(x => x.planner_id === pid);
  const getTotTarief = pid => getPmFor(pid).reduce((s, r) => s + Number(r.gekozen_tarief || r.marketingmiddel?.tarief || 0), 0);

  return <div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
      <div><h2 style={{ fontSize: 22, fontWeight: 700 }}>Planners{isMkt && <span style={{ fontSize: 12, color: "var(--t3)", fontWeight: 400 }}> (read-only)</span>}</h2>
        <p style={{ fontSize: 13, color: "var(--t3)", marginTop: 2 }}>{filtered.length} planners</p>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <Btn onClick={exportGeneriekeTemplate}>Template (.xlsx)</Btn>
        {!isMkt && <Btn onClick={() => setImportModal(true)}>Importeer inschrijving</Btn>}
        <Btn onClick={exportXLSX}>Export planners</Btn>
        {!isMkt && <Btn primary onClick={() => setModal(true)}>+ Nieuwe planner</Btn>}
      </div>
    </div>
    <Filters vals={f} onChange={(k, v) => setF(p => ({ ...p, [k]: v }))} defs={[{ key: "status", placeholder: "Status", opts: sts }, { key: "type", placeholder: "Type", opts: tps.length ? tps : ["Jaarafspraak", "Campagne", "Incidenteel"] }]} />

    {!loading && filtered.length > 0 && (
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 20 }}>
        <Stat label="Totaal planners" value={filtered.length} />
        <Stat label="Actief" value={filtered.filter(p => p.status === "Actief").length} />
        <Stat label="Totaal middelen" value={filtered.reduce((s, p) => s + (counts[p.id] || 0), 0)} />
        <Stat label="Totaal tarief" value={"€" + fmt(filtered.reduce((s, p) => s + getTotTarief(p.id), 0))} />
      </div>
    )}

    {/* ImportModal on main level — creates a new planner */}
    {importModal && <ImportModal
      leveranciers={levs}
      toast={toast}
      onClose={() => setImportModal(false)}
      onImport={async ({ leverancier_id, titel, type, keuzes }) => {
        // 1. Create the planner
        const res = await db.post("leveranciers_marketing_planner", { leverancier_id, titel, type, status: "Concept" });
        const plannerId = res[0].id;

        // 2. Add each keuze as planner_marketingmiddel
        for (const k of keuzes) {
          let midId;
          try {
            const existing = await db.get("marketingmiddel", { eq: { pakketnaam: k.pakketnaam }, limit: 1 });
            if (existing.length > 0) { midId = existing[0].id; }
            else {
              const migMiddel = MIGRATION.middelen.find(m => m.pakketnaam === k.pakketnaam);
              const created = await db.post("marketingmiddel", {
                pakketnaam: k.pakketnaam, rubriek: migMiddel?.rubriek || "", segment: migMiddel?.segment || "",
                tarief: k.tarief || 0, formaat: k.formaat || "", type_campagne: migMiddel?.rubriek || ""
              });
              midId = created[0].id;
            }
            const migMiddel = MIGRATION.middelen.find(m => m.pakketnaam === k.pakketnaam);
            let periodeMatch = null;
            if (k.periode && k.periode !== "—" && migMiddel) {
              periodeMatch = migMiddel.periodes.find(p => `${p.maand} ${p.jaar}` === k.periode);
            }
            await db.post("planner_marketingmiddel", {
              planner_id: plannerId, marketingmiddel_id: midId, status: "Gepland",
              gekozen_formaat: k.formaat || null, gekozen_tarief: k.tarief || null,
              gekozen_periode: k.periode && k.periode !== "—" ? k.periode : null,
              startdatum: periodeMatch?.publicatiedatum || null,
              deadline: periodeMatch?.deadline_leverancier || null
            });
          } catch (e) { console.error("Import row:", e); }
        }

        toast(`Planner "${titel}" aangemaakt met ${keuzes.length} middelen`);
        load();

        // Navigate to the new planner
        const full = await db.get("leveranciers_marketing_planner", { select: "*,leverancier:leverancier_id(bedrijfsnaam,leveranciernummer)", eq: { id: plannerId } });
        if (full[0]) setDetail(full[0]);
      }}
    />}

    {loading
      ? <Card style={{ padding: 0 }}>{[...Array(3)].map((_, i) => <div key={i} style={{ padding: "16px 20px", borderBottom: "1px solid var(--b)" }}><div className="sk" style={{ width: "50%", marginBottom: 6 }} /><div className="sk" style={{ width: "25%" }} /></div>)}</Card>
      : filtered.length === 0 ? <Card><Empty text="Geen planners gevonden" /></Card>
      : <Card style={{ padding: 0 }}>
        <table>
          <thead><tr><Th></Th><Th>Titel</Th><Th>Leverancier</Th><Th>Type</Th><Th>Status</Th><Th>Middelen</Th><Th>Tarief</Th><Th></Th></tr></thead>
          <tbody>
            {filtered.map(p => {
              const isOpen = expanded[p.id];
              const pItems = getPmFor(p.id);
              return <React.Fragment key={p.id}>
                <tr style={{ borderBottom: isOpen ? "none" : "1px solid var(--b)", background: isOpen ? "var(--tug)" : "transparent", transition: "background .1s" }}>
                  <td style={{ padding: "10px 6px 10px 14px", width: 30 }}>
                    <button onClick={() => toggleExpand(p.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "var(--t3)", transform: isOpen ? "rotate(90deg)" : "rotate(0)", transition: "transform .15s", padding: "2px 4px" }}>›</button>
                  </td>
                  <Td bold style={{ cursor: "pointer" }}><span onClick={() => setDetail(p)}>{p.titel}</span></Td>
                  <Td>{p.leverancier?.bedrijfsnaam || "—"}</Td>
                  <Td>{p.type}</Td>
                  <Td><Badge status={p.status} /></Td>
                  <Td mono>{counts[p.id] || 0}</Td>
                  <Td mono>€{fmt(getTotTarief(p.id))}</Td>
                  <Td style={{ width: 40 }}><Btn small onClick={() => setDetail(p)}>→</Btn></Td>
                </tr>
                {isOpen && (
                  <tr style={{ borderBottom: "1px solid var(--b)" }}>
                    <td colSpan={9} style={{ padding: 0 }}>
                      <div style={{ background: "var(--bg2)", borderTop: "1px solid var(--b)" }}>
                        {pItems.length === 0
                          ? <div style={{ padding: "12px 44px", fontSize: 12, color: "var(--t3)" }}>Geen middelen gekoppeld</div>
                          : <table>
                            <thead><tr>{["Middel", "Formaat", "Periode", "Deadline", "Tarief", "Status"].map(h => <th key={h} style={{ textAlign: "left", padding: "6px 14px 6px 14px", fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--t3)", borderBottom: "1px solid var(--b)" }}>{h}</th>)}</tr></thead>
                            <tbody>
                              {pItems.map((item, ii) => {
                                const dlP = item.deadline && new Date(item.deadline) < new Date();
                                return <tr key={item.id} style={{ borderBottom: ii < pItems.length - 1 ? "1px solid var(--b)" : "none" }}>
                                  <td style={{ padding: "8px 14px", fontSize: 13, fontWeight: 500 }}>{item.marketingmiddel?.pakketnaam}</td>
                                  <td style={{ padding: "8px 14px", fontSize: 12, color: item.gekozen_formaat ? "var(--bl)" : "var(--t3)", fontWeight: item.gekozen_formaat ? 600 : 400 }}>{item.gekozen_formaat || "—"}</td>
                                  <td style={{ padding: "8px 14px", fontSize: 12, color: "var(--t2)" }}>{item.gekozen_periode || (item.startdatum ? fmtD(item.startdatum) : "—")}</td>
                                  <td style={{ padding: "8px 14px", fontSize: 12 }}>{item.deadline ? <span style={{ color: dlP ? "var(--r)" : "var(--a)", fontWeight: 600 }}>{fmtD(item.deadline)}</span> : "—"}</td>
                                  <td style={{ padding: "8px 14px", fontSize: 12, fontFamily: "'JetBrains Mono',monospace" }}>€{fmt(item.gekozen_tarief || item.marketingmiddel?.tarief || 0)}</td>
                                  <td style={{ padding: "8px 14px" }}><Badge status={item.status} /></td>
                                </tr>;
                              })}
                            </tbody>
                          </table>}
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>;
            })}
          </tbody>
        </table>
      </Card>}
    {modal && <PlannerForm levs={levs} onSave={create} onClose={() => setModal(false)} />}
  </div>;
}

function PlannerForm({ levs, onSave, onClose }) {
  const [d, setD] = useState({ titel: "", type: "Jaarafspraak", leverancier_id: "" });
  const [q, setQ] = useState("");
  const ok = d.titel && d.type && d.leverancier_id;
  const fl = levs.filter(l => l.bedrijfsnaam.toLowerCase().includes(q.toLowerCase()) || String(l.leveranciernummer).includes(q));
  const sel = levs.find(l => l.id === d.leverancier_id);
  return <Modal title="Nieuwe planner" onClose={onClose}>
    <Field label="Titel" required><input value={d.titel} onChange={e => setD(p => ({ ...p, titel: e.target.value }))} placeholder="Bijv. Jaarplan Schneider 2026" /></Field>
    <Field label="Type" required><select value={d.type} onChange={e => setD(p => ({ ...p, type: e.target.value }))}><option>Jaarafspraak</option><option>Campagne</option><option>Incidenteel</option></select></Field>
    <Field label="Leverancier" required>
      <input placeholder="Zoek op naam of nummer..." value={q} onChange={e => { setQ(e.target.value); if (!e.target.value) setD(p => ({ ...p, leverancier_id: "" })); }} />
      {sel && !q && <div style={{ marginTop: 6, fontSize: 13, color: "var(--tu)", fontWeight: 600 }}>✓ {sel.bedrijfsnaam}</div>}
      {q && <div style={{ border: "1.5px solid var(--b)", borderRadius: "var(--rdx)", maxHeight: 180, overflow: "auto", marginTop: 6 }}>
        {fl.length === 0 ? <div style={{ padding: "10px 14px", fontSize: 13, color: "var(--t3)" }}>Geen resultaten</div>
          : fl.map(l => <div key={l.id} onClick={() => { setD(p => ({ ...p, leverancier_id: l.id })); setQ(""); }} style={{ padding: "10px 14px", cursor: "pointer", fontSize: 13, borderBottom: "1px solid var(--b)", transition: "background .1s" }} onMouseEnter={e => e.currentTarget.style.background = "var(--tug)"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            <strong>{l.bedrijfsnaam}</strong> <span style={{ color: "var(--t3)", fontFamily: "'JetBrains Mono',monospace", fontSize: 12 }}>#{l.leveranciernummer}</span>
          </div>)}
      </div>}
    </Field>
    <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 20, paddingTop: 16, borderTop: "1px solid var(--b)" }}>
      <Btn onClick={onClose}>Annuleren</Btn><Btn primary disabled={!ok} onClick={() => onSave(d)}>Aanmaken</Btn>
    </div>
  </Modal>;
}

// Export generieke leveranciers-template (.xlsx)
// ============================================================
function exportGeneriekeTemplate() {
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();

  // ── TAB 1: Inschrijving ──
  const headerRows = [
    ["Marketingplanner 2026–2027 — Technische Unie"],
    [""],
    ["Vul hieronder uw gegevens in en selecteer per rij de gewenste marketingmiddelen."],
    ["Kies eerst een marketingmiddel (kolom B), de overige velden worden automatisch gefilterd."],
    ["Prijzen, plaatsing en deadlines zijn onder voorbehoud. Zie tabblad 'Tarieven' voor meer informatie."],
    [""],
    ["Leveranciersnummer:", "", "", "Bedrijfsnaam:"],
    ["Contactpersoon:", "", "", "E-mailadres:"],
    [""],
  ];

  const hdr = ["", "Marketingmiddel", "Pakketnaam", "Periode", "Deadline", "Formaat", "Tarief"];
  // Empty input rows — leverancier fills these in
  const rows = [];
  for (let i = 0; i < 30; i++) rows.push([i + 1, "", "", "", "", "", ""]);

  const ws1 = XLSX.utils.aoa_to_sheet([...headerRows, hdr, ...rows]);
  ws1["!cols"] = [{ wch: 5 }, { wch: 32 }, { wch: 48 }, { wch: 22 }, { wch: 18 }, { wch: 18 }, { wch: 16 }];
  ws1["!merges"] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 6 } }];
  XLSX.utils.book_append_sheet(wb, ws1, "Inschrijving");

  // ── TAB 2: Tarieven overzicht ──
  const hdr2 = ["Marketingmiddel", "Pakketnaam", "Formaat", "Tarief (EUR)", "Rubriek", "Segment", "Doorbelasting PN"];
  const rows2 = [];
  MIGRATION.middelen.forEach(m => {
    if (m.formaten.length > 0) {
      m.formaten.forEach(f => rows2.push([m.marketingmiddel, m.pakketnaam, f.formaat, f.tarief, m.rubriek, m.segment, m.doorbelasting ? "Ja" : "Nee"]));
    } else {
      rows2.push([m.marketingmiddel, m.pakketnaam, "—", m.basistarief || 0, m.rubriek, m.segment, m.doorbelasting ? "Ja" : "Nee"]);
    }
  });
  const ws2 = XLSX.utils.aoa_to_sheet([hdr2, ...rows2]);
  ws2["!cols"] = [{ wch: 28 }, { wch: 44 }, { wch: 12 }, { wch: 14 }, { wch: 26 }, { wch: 36 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, ws2, "Tarieven");

  // ── TAB 3: Data (metadata for import) ──
  const ws3 = XLSX.utils.aoa_to_sheet([
    ["template_version", "1.0"],
    ["template_id", "MKPL-2026-2027"],
    ["export_datum", new Date().toISOString().slice(0, 10)],
    ["data_start_row", 10],
    ["leverancier_nr_cell", "B7"],
    ["leverancier_naam_cell", "E7"],
    ["contactpersoon_cell", "B8"],
    ["email_cell", "E8"],
  ]);
  XLSX.utils.book_append_sheet(wb, ws3, "Data");

  XLSX.writeFile(wb, `Marketingplanner_2026-2027_Template.xlsx`);
}

// ============================================================
// ImportModal — importeer ingevulde template → maakt nieuwe planner aan
// ============================================================
function ImportModal({ onImport, onClose, toast, leveranciers }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState(null);
  const [importing, setImporting] = useState(false);
  const [levMatch, setLevMatch] = useState(null);
  const [plannerTitel, setPlannerTitel] = useState("");

  async function handleFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    setError(null);
    setPreview(null);
    setLevMatch(null);
    setPlannerTitel("");

    try {
      const data = await f.arrayBuffer();
      const wb = XLSX.read(data);

      if (!wb.SheetNames.includes("Inschrijving")) {
        setError("Dit bestand bevat geen 'Inschrijving' tabblad. Gebruik de geëxporteerde template.");
        return;
      }

      // Read metadata from Data sheet (if present)
      let meta = {};
      if (wb.SheetNames.includes("Data")) {
        const dataSh = XLSX.utils.sheet_to_json(wb.Sheets["Data"], { header: 1 });
        dataSh.forEach(row => { if (row[0] && row[1] !== undefined) meta[row[0]] = row[1]; });
      }

      // Read leverancier info from header area
      const rawSheet = XLSX.utils.sheet_to_json(wb.Sheets["Inschrijving"], { header: 1 });
      let levNr = "", levNaam = "", contact = "", email = "";

      // Row 7 (index 6): Leveranciersnummer + Bedrijfsnaam
      if (rawSheet[6]) {
        levNr = String(rawSheet[6][1] || "").trim();
        levNaam = String(rawSheet[6][4] || "").trim();
      }
      // Row 8 (index 7): Contactpersoon + E-mail
      if (rawSheet[7]) {
        contact = String(rawSheet[7][1] || "").trim();
        email = String(rawSheet[7][4] || "").trim();
      }

      // Try to match leverancier
      if (levNr && leveranciers) {
        const match = leveranciers.find(l => String(l.leveranciernummer) === levNr);
        if (match) setLevMatch(match);
      }
      if (!levMatch && levNaam && leveranciers) {
        const match = leveranciers.find(l => l.bedrijfsnaam.toLowerCase().includes(levNaam.toLowerCase()));
        if (match) setLevMatch(match);
      }

      // Read inschrijving data (skip header rows)
      const dataStartRow = parseInt(meta.data_start_row) || 10;
      const inschrijving = XLSX.utils.sheet_to_json(wb.Sheets["Inschrijving"], { range: dataStartRow - 1 });

      // Filter rows where leverancier has filled in a pakketnaam (= deelname)
      const keuzes = inschrijving.filter(row => {
        const pn = String(row["Pakketnaam"] || "").trim();
        return pn && pn !== "—" && pn !== "";
      }).map(row => {
        const pn = String(row["Pakketnaam"] || "").trim();
        const formaat = row["Formaat"] && String(row["Formaat"]).trim() !== "n.v.t." && String(row["Formaat"]).trim() !== "" ? String(row["Formaat"]).trim() : null;
        const migMiddel = MIGRATION.middelen.find(m => m.pakketnaam === pn);
        let tarief = 0;
        if (migMiddel) {
          if (formaat && migMiddel.formaten.length > 0) {
            const fmt = migMiddel.formaten.find(f => f.formaat === formaat);
            tarief = fmt ? fmt.tarief : 0;
          } else {
            tarief = migMiddel.basistarief || 0;
          }
        }
        // Also try to read tarief from the Excel if VLOOKUP resolved
        const excelTarief = row["Tarief"];
        if (excelTarief && typeof excelTarief === "number" && excelTarief > 0) tarief = excelTarief;

        return {
          marketingmiddel: row["Marketingmiddel"] || "",
          pakketnaam: pn,
          periode: row["Periode"] || "",
          formaat, tarief,
        };
      });

      const titel = levNaam ? `Jaarplan ${levNaam} 2026` : "Geïmporteerde planner";
      setPlannerTitel(titel);

      setPreview({
        meta, levNr, levNaam, contact, email, keuzes,
        totaalRijen: inschrijving.length,
        totaalTarief: keuzes.reduce((s, k) => s + k.tarief, 0)
      });
    } catch (err) {
      setError("Fout bij het lezen van het bestand: " + err.message);
    }
  }

  // Try to match leverancier when preview changes
  useEffect(() => {
    if (preview && leveranciers) {
      if (preview.levNr) {
        const m = leveranciers.find(l => String(l.leveranciernummer) === String(preview.levNr));
        if (m) { setLevMatch(m); return; }
      }
      if (preview.levNaam) {
        const m = leveranciers.find(l => l.bedrijfsnaam.toLowerCase().includes(preview.levNaam.toLowerCase()));
        if (m) setLevMatch(m);
      }
    }
  }, [preview, leveranciers]);

  async function doImport() {
    if (!preview || !levMatch) return;
    setImporting(true);
    try {
      await onImport({
        leverancier_id: levMatch.id,
        titel: plannerTitel,
        type: "Jaarafspraak",
        keuzes: preview.keuzes
      });
      onClose();
    } catch (err) {
      toast("Import mislukt: " + err.message, "error");
    }
    setImporting(false);
  }

  return <Modal title="Importeer leveranciers-inschrijving" onClose={onClose} wide>
    {/* File upload */}
    <div style={{ marginBottom: 20 }}>
      <div style={{ border: "2px dashed var(--b2)", borderRadius: "var(--rd)", padding: "24px 20px", textAlign: "center", background: "var(--bg2)", cursor: "pointer", transition: "border-color .15s" }}
        onClick={() => document.getElementById("import-file-input").click()}
        onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = "var(--tu)"; }}
        onDragLeave={e => e.currentTarget.style.borderColor = "var(--b2)"}
        onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = "var(--b2)"; const f = e.dataTransfer.files[0]; if (f) handleFile({ target: { files: [f] } }); }}>
        <div style={{ fontSize: 28, marginBottom: 8, opacity: 0.5 }}>📄</div>
        <div style={{ fontSize: 14, fontWeight: 600, color: "var(--t)" }}>
          {file ? file.name : "Klik of sleep een .xlsx bestand hierheen"}
        </div>
        <div style={{ fontSize: 12, color: "var(--t3)", marginTop: 4 }}>Gebruik de geëxporteerde Marketingplanner template</div>
        <input id="import-file-input" type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display: "none" }} />
      </div>
    </div>

    {error && <div style={{ padding: "12px 16px", background: "var(--rb)", border: "1px solid rgba(239,68,68,.3)", borderRadius: "var(--rds)", color: "var(--r)", fontSize: 13, fontWeight: 600, marginBottom: 16 }}>{error}</div>}

    {preview && (
      <div>
        {/* Leverancier match */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
          <div style={{ background: levMatch ? "var(--tul)" : "var(--ab)", borderRadius: "var(--rds)", padding: "12px 16px", border: `1px solid ${levMatch ? "rgba(0,124,49,.2)" : "rgba(245,158,11,.3)"}` }}>
            <div style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", color: "var(--t3)", marginBottom: 4 }}>Leverancier</div>
            {levMatch ? (
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--tu2)" }}>{levMatch.bedrijfsnaam}</div>
                <div style={{ fontSize: 12, color: "var(--t3)", fontFamily: "'JetBrains Mono',monospace" }}>#{levMatch.leveranciernummer}</div>
              </div>
            ) : (
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: "var(--a)" }}>Leverancier niet gevonden</div>
                <div style={{ fontSize: 12, color: "var(--t3)" }}>Nr: {preview.levNr || "—"} · Naam: {preview.levNaam || "—"}</div>
                <div style={{ marginTop: 8 }}>
                  <select onChange={e => { const l = leveranciers.find(x => x.id === e.target.value); setLevMatch(l || null); }}
                    style={{ fontSize: 12, padding: "6px 10px", width: "100%" }}>
                    <option value="">Selecteer handmatig...</option>
                    {leveranciers.map(l => <option key={l.id} value={l.id}>{l.bedrijfsnaam} #{l.leveranciernummer}</option>)}
                  </select>
                </div>
              </div>
            )}
          </div>
          <div style={{ background: "var(--s2)", borderRadius: "var(--rds)", padding: "12px 16px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", color: "var(--t3)", marginBottom: 4 }}>Samenvatting</div>
            <div style={{ fontSize: 14 }}>
              <strong style={{ color: "var(--tu)" }}>{preview.keuzes.length}</strong> van {preview.totaalRijen} middelen geselecteerd
              <span style={{ marginLeft: 10, fontFamily: "'JetBrains Mono',monospace", fontWeight: 600 }}>€{fmt(preview.totaalTarief)}</span>
            </div>
            {preview.contact && <div style={{ fontSize: 12, color: "var(--t3)", marginTop: 4 }}>Contact: {preview.contact} · {preview.email}</div>}
          </div>
        </div>

        {/* Planner title */}
        <Field label="Planner titel">
          <input value={plannerTitel} onChange={e => setPlannerTitel(e.target.value)} placeholder="Bijv. Jaarplan Schneider 2026" />
        </Field>

        {/* Keuzes preview */}
        {preview.keuzes.length === 0 ? (
          <div style={{ padding: "24px 16px", textAlign: "center", color: "var(--t3)", fontSize: 13 }}>Geen middelen met "JA" gevonden. De leverancier heeft niets geselecteerd.</div>
        ) : (
          <div style={{ border: "1px solid var(--b)", borderRadius: "var(--rds)", maxHeight: 280, overflow: "auto", marginBottom: 12 }}>
            <table><thead><tr><Th>Pakketnaam</Th><Th>Periode</Th><Th>Formaat</Th><Th>Tarief</Th></tr></thead>
              <tbody>{preview.keuzes.map((k, i) => (
                <tr key={i} style={{ borderBottom: i < preview.keuzes.length - 1 ? "1px solid var(--b)" : "none" }}>
                  <Td bold>{k.pakketnaam}</Td><Td>{k.periode || "—"}</Td><Td>{k.formaat || "—"}</Td>
                  <Td mono>€{fmt(k.tarief)}</Td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}

        {preview.meta.template_version && <div style={{ fontSize: 11, color: "var(--t3)", marginBottom: 8 }}>Template v{preview.meta.template_version} · Geëxporteerd: {preview.meta.export_datum || "—"}</div>}
      </div>
    )}

    <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 16, borderTop: "1px solid var(--b)" }}>
      <Btn onClick={onClose}>Annuleren</Btn>
      {preview && preview.keuzes.length > 0 && levMatch && plannerTitel && (
        <Btn primary disabled={importing} onClick={doImport}>
          {importing ? "Importeren..." : `Planner aanmaken (${preview.keuzes.length} middelen)`}
        </Btn>
      )}
    </div>
  </Modal>;
}

function SelModal({ onSelect, onClose, existing, toast }) {
  const [f, setF] = useState({});
  const [step, setStep] = useState("middel"); // "middel" | "formaat" | "periode"
  const [selMiddel, setSelMiddel] = useState(null);
  const [selFormaat, setSelFormaat] = useState(null); // { formaat, tarief }
  const [selPeriodes, setSelPeriodes] = useState([]); // multi-select

  const items = MIGRATION.middelen;
  const allMM = [...new Set(items.map(m => m.marketingmiddel))].sort();
  const rubs = [...new Set(items.map(m => m.rubriek).filter(Boolean))];
  const segs = [...new Set(items.map(m => m.segment).filter(Boolean))];

  const fl = items.filter(m => {
    if (f.marketingmiddel && m.marketingmiddel !== f.marketingmiddel) return false;
    if (f.rubriek && m.rubriek !== f.rubriek) return false;
    if (f.segment && m.segment !== f.segment) return false;
    return true;
  });

  const isLinked = (pn) => existing.some(e => e === pn);

  function goToFormaat(m) {
    setSelMiddel(m);
    if (m.formaten.length > 0) {
      setStep("formaat");
    } else {
      setSelFormaat({ formaat: null, tarief: m.basistarief });
      setSelPeriodes([]);
      setStep("periode");
    }
  }

  function goToPeriode(m, fmt) {
    setSelFormaat(fmt);
    setSelPeriodes([]);
    setStep("periode");
  }

  function togglePeriode(p) {
    setSelPeriodes(prev => {
      const key = `${p.jaar}-${p.maand}`;
      const exists = prev.find(x => `${x.jaar}-${x.maand}` === key);
      return exists ? prev.filter(x => `${x.jaar}-${x.maand}` !== key) : [...prev, p];
    });
  }

  function confirm() {
    onSelect({
      pakketnaam: selMiddel.pakketnaam,
      marketingmiddel: selMiddel.marketingmiddel,
      formaat: selFormaat?.formaat || null,
      tarief: selFormaat?.tarief,
      rubriek: selMiddel.rubriek,
      segment: selMiddel.segment,
      periodes: selPeriodes
    });
  }

  function goBack() {
    if (step === "periode" && selMiddel?.formaten?.length > 0) { setStep("formaat"); setSelPeriodes([]); }
    else if (step === "periode") { setStep("middel"); setSelMiddel(null); setSelFormaat(null); setSelPeriodes([]); }
    else if (step === "formaat") { setStep("middel"); setSelMiddel(null); setSelFormaat(null); }
  }

  // Header for steps 2 & 3
  function SelHeader() {
    return <div style={{ marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid var(--b)" }}>
      <div style={{ fontSize: 12, color: "var(--t3)", marginBottom: 4 }}>{selMiddel.marketingmiddel}</div>
      <div style={{ fontSize: 17, fontWeight: 700 }}>{selMiddel.pakketnaam}</div>
      <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap", alignItems: "center" }}>
        {selMiddel.rubriek && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 99, background: "var(--blb)", color: "var(--bl)", fontWeight: 600 }}>{selMiddel.rubriek}</span>}
        {selMiddel.segment && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 99, background: "var(--s2)", color: "var(--t2)" }}>{selMiddel.segment}</span>}
        {selFormaat?.formaat && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 99, background: "var(--ab)", color: "var(--a)", fontWeight: 600 }}>Formaat: {selFormaat.formaat}</span>}
        {selFormaat?.tarief != null && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 99, background: "var(--tul)", color: "var(--tu2)", fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>€{fmt(selFormaat.tarief)}</span>}
      </div>
      {/* Step indicator */}
      <div style={{ display: "flex", gap: 4, marginTop: 12 }}>
        {["middel", selMiddel?.formaten?.length > 0 ? "formaat" : null, "periode"].filter(Boolean).map((s, i) => (
          <React.Fragment key={s}>
            {i > 0 && <span style={{ color: "var(--t3)", fontSize: 11, padding: "0 2px" }}>→</span>}
            <span style={{ fontSize: 11, fontWeight: step === s ? 700 : 400, color: step === s ? "var(--tu)" : "var(--t3)", padding: "2px 8px", borderRadius: 4, background: step === s ? "var(--tul)" : "transparent" }}>
              {s === "middel" ? "Middel ✓" : s === "formaat" ? (step === "formaat" ? "Formaat" : "Formaat ✓") : "Periode"}
            </span>
          </React.Fragment>
        ))}
      </div>
    </div>;
  }

  // ── STEP 3: PERIODE PICKER ──
  if (step === "periode") {
    const periodes = selMiddel.periodes || [];
    const now = new Date().toISOString().slice(0, 10);
    const upcoming = periodes.filter(p => !p.deadline_leverancier || p.deadline_leverancier >= now);
    const past = periodes.filter(p => p.deadline_leverancier && p.deadline_leverancier < now);

    return <Modal title="Periode kiezen" onClose={onClose} wide>
      <SelHeader />
      <div style={{ fontSize: 13, fontWeight: 600, color: "var(--t3)", marginBottom: 10, textTransform: "uppercase", letterSpacing: ".06em" }}>
        Selecteer periode(s) <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>— meerdere mogelijk</span>
      </div>

      {periodes.length === 0 ? (
        <div style={{ padding: "24px 16px", textAlign: "center", color: "var(--t3)", fontSize: 13 }}>
          Geen periodes beschikbaar voor dit middel
        </div>
      ) : (
        <div style={{ border: "1px solid var(--b)", borderRadius: "var(--rds)", overflow: "hidden", maxHeight: 320, overflowY: "auto" }}>
          {upcoming.length > 0 && upcoming.map((p, i) => {
            const key = `${p.jaar}-${p.maand}`;
            const selected = selPeriodes.find(x => `${x.jaar}-${x.maand}` === key);
            return <div key={key + i} onClick={() => togglePeriode(p)}
              style={{
                display: "flex", alignItems: "center", padding: "10px 16px", gap: 12, cursor: "pointer",
                borderBottom: "1px solid var(--b)",
                background: selected ? "var(--tul)" : "transparent",
                transition: "background .1s"
              }}
              onMouseEnter={e => { if (!selected) e.currentTarget.style.background = "var(--tug)"; }}
              onMouseLeave={e => { if (!selected) e.currentTarget.style.background = "transparent"; }}>
              <div style={{ width: 20, height: 20, borderRadius: 4, border: `2px solid ${selected ? "var(--tu)" : "var(--b2)"}`, background: selected ? "var(--tu)" : "var(--s)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .15s" }}>
                {selected && <span style={{ color: "#fff", fontSize: 12, fontWeight: 800 }}>✓</span>}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14 }}>
                  {p.maand} <span style={{ fontFamily: "'JetBrains Mono',monospace", color: "var(--t2)" }}>{p.jaar}</span>
                </div>
              </div>
              <div style={{ textAlign: "right", fontSize: 12 }}>
                {p.publicatiedatum && <div style={{ color: "var(--t2)" }}>Publicatie: {fmtD(p.publicatiedatum)}</div>}
                {p.deadline_leverancier && <div style={{ color: "var(--a)", fontWeight: 600 }}>Deadline: {fmtD(p.deadline_leverancier)}</div>}
              </div>
            </div>;
          })}
          {past.length > 0 && (
            <div>
              <div style={{ padding: "8px 16px", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".06em", color: "var(--t3)", background: "var(--s2)", borderBottom: "1px solid var(--b)" }}>
                Verlopen deadlines
              </div>
              {past.map((p, i) => {
                const key = `${p.jaar}-${p.maand}`;
                const selected = selPeriodes.find(x => `${x.jaar}-${x.maand}` === key);
                return <div key={key + i} onClick={() => togglePeriode(p)}
                  style={{
                    display: "flex", alignItems: "center", padding: "10px 16px", gap: 12, cursor: "pointer",
                    borderBottom: i < past.length - 1 ? "1px solid var(--b)" : "none", opacity: 0.6,
                    background: selected ? "var(--rb)" : "transparent"
                  }}>
                  <div style={{ width: 20, height: 20, borderRadius: 4, border: `2px solid ${selected ? "var(--r)" : "var(--b2)"}`, background: selected ? "var(--r)" : "var(--s)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    {selected && <span style={{ color: "#fff", fontSize: 12, fontWeight: 800 }}>✓</span>}
                  </div>
                  <div style={{ flex: 1 }}>
                    <span style={{ fontWeight: 600, fontSize: 14 }}>
                      {p.maand} <span style={{ fontFamily: "'JetBrains Mono',monospace", color: "var(--t3)" }}>{p.jaar}</span>
                    </span>
                  </div>
                  <div style={{ textAlign: "right", fontSize: 12 }}>
                    <div style={{ color: "var(--r)", fontWeight: 600 }}>Verlopen: {fmtD(p.deadline_leverancier)}</div>
                  </div>
                </div>;
              })}
            </div>
          )}
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16, paddingTop: 16, borderTop: "1px solid var(--b)" }}>
        <Btn small onClick={goBack}>← Terug</Btn>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {selPeriodes.length > 0 && <span style={{ fontSize: 12, color: "var(--tu)", fontWeight: 600 }}>{selPeriodes.length} periode{selPeriodes.length !== 1 ? "s" : ""} geselecteerd</span>}
          <Btn primary onClick={confirm}>
            {selPeriodes.length > 0 ? `Toevoegen (${selPeriodes.length})` : "Toevoegen zonder periode"}
          </Btn>
        </div>
      </div>
    </Modal>;
  }

  // ── STEP 2: FORMAAT PICKER ──
  if (step === "formaat") {
    return <Modal title="Formaat kiezen" onClose={onClose} wide>
      <SelHeader />
      <div style={{ fontSize: 13, fontWeight: 600, color: "var(--t3)", marginBottom: 10, textTransform: "uppercase", letterSpacing: ".06em" }}>Kies een formaat</div>
      <div style={{ border: "1px solid var(--b)", borderRadius: "var(--rds)", overflow: "hidden" }}>
        {selMiddel.formaten.map((ft, i) => {
          const lk = isLinked(selMiddel.pakketnaam + ":" + ft.formaat);
          return <div key={i} style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: i < selMiddel.formaten.length - 1 ? "1px solid var(--b)" : "none", gap: 14, opacity: lk ? 0.4 : 1, cursor: lk ? "default" : "pointer" }}
            onClick={() => { if (!lk) goToPeriode(selMiddel, ft); }}
            onMouseEnter={e => { if (!lk) e.currentTarget.style.background = "var(--tug)"; }}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            <div style={{ flex: 1 }}>
              <span style={{ fontWeight: 600, fontSize: 14 }}>{ft.formaat}</span>
              {lk && <span style={{ fontSize: 11, color: "var(--t3)", marginLeft: 8 }}>(gekoppeld)</span>}
            </div>
            <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 14, fontWeight: 600, color: "var(--t)" }}>€{fmt(ft.tarief)}</span>
            {!lk && <span style={{ fontSize: 12, color: "var(--tu)", fontWeight: 600 }}>Kies →</span>}
          </div>;
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "flex-start", marginTop: 16 }}>
        <Btn small onClick={goBack}>← Terug naar overzicht</Btn>
      </div>
    </Modal>;
  }

  // ── STEP 1: MIDDEL PICKER ──
  return <Modal title="Middel selecteren" onClose={onClose} wide>
    <Filters vals={f} onChange={(k, v) => setF(p => ({ ...p, [k]: v }))} defs={[
      { key: "marketingmiddel", placeholder: "Alle marketingmiddelen", opts: allMM },
      { key: "rubriek", placeholder: "Alle rubrieken", opts: rubs },
      { key: "segment", placeholder: "Alle segmenten", opts: segs }
    ]} />
    <div style={{ maxHeight: 420, overflow: "auto", borderRadius: "var(--rdx)", border: "1px solid var(--b)" }}>
      {fl.length === 0 && <div style={{ padding: "24px 16px", textAlign: "center", color: "var(--t3)", fontSize: 13 }}>Geen middelen gevonden</div>}
      {fl.map((m, i) => {
        const hasFormaten = m.formaten.length > 0;
        const hasPeriodes = m.periodes.length > 0;
        const tarief = hasFormaten
          ? `€${fmt(Math.min(...m.formaten.map(f => f.tarief)))} – €${fmt(Math.max(...m.formaten.map(f => f.tarief)))}`
          : m.basistarief != null ? `€${fmt(m.basistarief)}` : "—";
        const lk = !hasFormaten && isLinked(m.pakketnaam);
        return <div key={m._id || i} style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: i < fl.length - 1 ? "1px solid var(--b)" : "none", opacity: lk ? 0.4 : 1, gap: 14, cursor: lk ? "default" : "pointer" }}
          onClick={() => { if (!lk) goToFormaat(m); }}
          onMouseEnter={e => { if (!lk) e.currentTarget.style.background = "var(--tug)"; }}
          onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 14 }}>
              {m.pakketnaam}
              {lk && <span style={{ fontSize: 11, color: "var(--t3)" }}> (gekoppeld)</span>}
            </div>
            <div style={{ fontSize: 12, color: "var(--t3)", marginTop: 2, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              <span>{m.marketingmiddel} · {m.segment || "—"} · {tarief}</span>
              {hasFormaten && <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 4, background: "var(--blb)", color: "var(--bl)", fontWeight: 600 }}>{m.formaten.length} formaten</span>}
              {hasPeriodes && <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 4, background: "var(--ab)", color: "var(--a)", fontWeight: 600 }}>{m.periodes.length} periodes</span>}
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            {!lk && <span style={{ fontSize: 12, color: "var(--tu)", fontWeight: 600, whiteSpace: "nowrap" }}>
              {hasFormaten ? "Kies formaat →" : hasPeriodes ? "Kies periode →" : "Selecteer →"}
            </span>}
          </div>
        </div>;
      })}
    </div>
  </Modal>;
}

// ============================================================
// APP — passes role to MiddelenPage
// ============================================================
function App() {
  const [page, setPage] = useState("planners");
  const [role, setRole] = useState("inkoop");
  const [toast, setToast] = useState(null);
  const [dbOk, setDbOk] = useState(null);
  const show = useCallback((m, t = "success") => setToast({ msg: m, type: t }), []);
  useEffect(() => {
    (async () => { try { await db.get("leverancier", { limit: 1 }); setDbOk(true); } catch { setDbOk(false); } })();
  }, []);
  const nav = [{ id: "planners", label: "Planners" }, { id: "middelen", label: "Middelen" }, { id: "leveranciers", label: "Leveranciers" }];

  return <div style={{ display: "flex", minHeight: "100vh" }}>
    {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    <aside style={{ width: 240, background: "#fff", borderRight: "1px solid var(--b)", display: "flex", flexDirection: "column", flexShrink: 0, position: "sticky", top: 0, height: "100vh" }}>
      <div style={{ padding: "16px 18px", borderBottom: "1px solid var(--b)" }}>
        <img src="https://www.c.technischeunie.nl/content/dam/technische-unie/styleguide1/logo/logoTU.png" alt="TU" style={{ height: 24 }} onError={e => { e.target.style.display = "none"; e.target.nextSibling.style.display = "flex"; }} />
        <div style={{ display: "none", alignItems: "center", gap: 6, fontWeight: 700, fontSize: 14, color: "var(--tu)" }}>
          <span style={{ width: 22, height: 22, borderRadius: 4, background: "var(--tu)", color: "#fff", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800 }}>TU</span>Technische Unie
        </div>
        <div style={{ fontSize: 12, fontWeight: 600, color: "var(--t2)", marginTop: 8 }}>Inzet Marketingmiddelen</div>
      </div>
      <nav style={{ padding: "12px 10px", flex: 1 }}>
        {nav.map(n => <button key={n.id} onClick={() => setPage(n.id)} style={{ display: "flex", alignItems: "center", width: "100%", padding: "8px 10px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 13, fontWeight: page === n.id ? 600 : 400, background: page === n.id ? "var(--tul)" : "transparent", color: page === n.id ? "var(--tu2)" : "var(--t2)", marginBottom: 2, transition: "all .1s", textAlign: "left" }}>{n.label}</button>)}
      </nav>
      <div style={{ padding: "12px 18px", borderTop: "1px solid var(--b)" }}>
        <div style={{ fontSize: 11, color: "var(--t3)", marginBottom: 8 }}>Actieve rol</div>
        <div style={{ display: "flex", background: "var(--s2)", borderRadius: 6, padding: 2, gap: 2 }}>
          {[{ id: "inkoop", l: "Inkoop" }, { id: "marketing", l: "Marketing" }].map(r => <button key={r.id} onClick={() => setRole(r.id)} style={{ flex: 1, padding: "5px 0", borderRadius: 4, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, transition: "all .12s", background: role === r.id ? "var(--tu)" : "transparent", color: role === r.id ? "#fff" : "var(--t3)" }}>{r.l}</button>)}
        </div>
        <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ width: 6, height: 6, borderRadius: 6, background: dbOk === null ? "var(--a)" : dbOk ? "var(--tu)" : "var(--r)" }} />
          <span style={{ fontSize: 11, color: "var(--t3)" }}>{dbOk === null ? "Verbinden..." : dbOk ? "Database online" : "Database offline"}</span>
        </div>
      </div>
    </aside>
    <div style={{ flex: 1, background: "var(--bg2)" }}>
      <div style={{ padding: "12px 28px", borderBottom: "1px solid var(--b)", background: "#fff", fontSize: 13, color: "var(--t3)", display: "flex", alignItems: "center", gap: 6 }}>
        <span>Home</span><span style={{ color: "var(--b2)" }}>›</span>
        <span style={{ color: "var(--t)", fontWeight: 500 }}>{nav.find(n => n.id === page)?.label}</span>
      </div>
      <main style={{ padding: "24px 28px 60px" }}>
        {dbOk === false && <Card style={{ padding: 16, marginBottom: 16, borderColor: "var(--r)" }}><strong style={{ color: "var(--r)" }}>Database niet gevonden</strong><span style={{ fontSize: 13, color: "var(--t2)", marginLeft: 8 }}>Controleer Supabase verbinding.</span></Card>}
        {page === "planners" && <PlannersPage toast={show} role={role} />}
        {page === "middelen" && <MiddelenPage toast={show} role={role} />}
        {page === "leveranciers" && <LeveranciersPage toast={show} />}
      </main>
    </div>
  </div>;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
